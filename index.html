<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMORK Fintech Expense Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

<style>
body { background:#05060f; color:white; font-family:system-ui; }

.glass {
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.1);
}

.neon { box-shadow:0 0 25px #3b82f6; }

.btn:hover { transform:scale(1.05); transition:0.3s; }

.toast {
  position:fixed; bottom:20px; right:20px;
  background:#111; padding:10px 15px; border-radius:8px;
  opacity:0; transform:translateY(20px); transition:0.3s;
}
.toast.show { opacity:1; transform:translateY(0); }
</style>
</head>

<body class="p-4">

<h1 class="text-3xl font-bold text-center mb-6">💳 Fintech Expense Dashboard</h1>

<!-- BALANCE -->
<div class="glass p-6 rounded-xl text-center mb-6 neon">
  <p class="text-gray-400">Total Balance</p>
  <h2 id="balance" class="text-3xl font-bold mt-2">₦0</h2>
</div>

<!-- SUMMARY -->
<div class="grid grid-cols-2 gap-4 mb-6">
  <div class="glass p-4 rounded-xl text-center">
    <p class="text-green-400">Income</p>
    <h3 id="income">₦0</h3>
  </div>
  <div class="glass p-4 rounded-xl text-center">
    <p class="text-red-400">Expenses</p>
    <h3 id="expense">₦0</h3>
  </div>
</div>

<!-- CHART -->
<div class="glass p-4 rounded-xl mb-6">
  <canvas id="chart"></canvas>
</div>

<!-- FILTER -->
<div class="flex gap-2 mb-4">
  <button onclick="setFilter('all')" class="bg-gray-700 px-3 py-1 rounded">All</button>
  <button onclick="setFilter('income')" class="bg-green-600 px-3 py-1 rounded">Income</button>
  <button onclick="setFilter('expense')" class="bg-red-600 px-3 py-1 rounded">Expense</button>
</div>

<!-- FORM -->
<div class="glass p-4 rounded-xl mb-6">
  <input id="text" placeholder="Title" class="w-full p-2 mb-2 bg-black border border-gray-700 rounded"/>
  <input id="amount" type="number" placeholder="Amount" class="w-full p-2 mb-2 bg-black border border-gray-700 rounded"/>
  <button onclick="addTransaction()" class="w-full bg-blue-500 py-2 rounded btn">Add</button>
</div>

<!-- LIST -->
<div class="glass p-4 rounded-xl">
  <ul id="list"></ul>
</div>

<div id="toast" class="toast">Done</div>

<script>
let transactions = JSON.parse(localStorage.getItem("transactions")) || [];
let filter = "all";
let editingId = null;

const ctx = document.getElementById("chart").getContext("2d");
let chart = new Chart(ctx, {
  type: 'doughnut',
  data: {
    labels: ['Income','Expense'],
    datasets: [{
      data: [0,0],
      backgroundColor: ['#22c55e','#ef4444']
    }]
  }
});

function showToast(msg){
  const toast = document.getElementById("toast");
  toast.innerText = msg;
  toast.classList.add("show");
  setTimeout(()=>toast.classList.remove("show"),2000);
}

function addTransaction(){
  const text = document.getElementById("text").value;
  const amount = +document.getElementById("amount").value;

  if(!text || !amount) return;

  if(editingId){
    transactions = transactions.map(t =>
      t.id === editingId ? {...t,text,amount} : t
    );
    editingId = null;
    showToast("Updated");
  } else {
    transactions.push({id:Date.now(),text,amount});
    showToast("Added");
  }

  save();
  render();
}

function deleteTransaction(id){
  transactions = transactions.filter(t=>t.id!==id);
  save();
  render();
  showToast("Deleted");
}

function editTransaction(id){
  const t = transactions.find(t=>t.id===id);
  document.getElementById("text").value = t.text;
  document.getElementById("amount").value = t.amount;
  editingId = id;
}

function setFilter(f){
  filter = f;
  render();
}

function save(){
  localStorage.setItem("transactions",JSON.stringify(transactions));
}

function render(){
  const list = document.getElementById("list");
  list.innerHTML = "";

  let income=0, expense=0;

  transactions.forEach(t=>{
    if(filter==="income" && t.amount<0) return;
    if(filter==="expense" && t.amount>0) return;

    const li = document.createElement("li");
    li.className="flex justify-between items-center mb-2";

    li.innerHTML=`
      <span>${t.text}</span>
      <span>₦${t.amount}</span>
      <div>
        <button onclick="editTransaction(${t.id})">✏️</button>
        <button onclick="deleteTransaction(${t.id})">❌</button>
      </div>
    `;

    list.appendChild(li);

    if(t.amount>0) income+=t.amount;
    else expense+=t.amount;
  });

  document.getElementById("income").innerText="₦"+income;
  document.getElementById("expense").innerText="₦"+Math.abs(expense);
  document.getElementById("balance").innerText="₦"+(income+expense);

  chart.data.datasets[0].data=[income,Math.abs(expense)];
  chart.update();
}

render();
</script>

</body>
  </html>
