<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMORK PAY</title>

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&family=DM+Mono&display=swap" rel="stylesheet">

<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

<!-- Chart -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  font-family:'Plus Jakarta Sans',sans-serif;
  background:#05060f;
  color:white;
  overflow-x:hidden;
}

/* STATUS BAR */
.status-bar{
  display:flex;
  justify-content:space-between;
  font-size:12px;
  padding:6px 12px;
  color:#aaa;
}

/* GLASS */
.glass{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(14px);
  border:1px solid rgba(255,255,255,0.08);
}

/* NAV */
.nav{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  display:flex;
  justify-content:space-around;
  padding:10px 0;
  background:#05060f;
  border-top:1px solid rgba(255,255,255,0.1);
}

.nav i{font-size:18px;}
.nav div{cursor:pointer;}

/* PAGES */
.page{display:none;}
.page.active{display:block;}

/* BUTTON FEEL */
.tap:active{transform:scale(0.95);}

/* TOAST */
.toast{
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%) translateY(-20px);
  opacity:0;
  transition:0.3s;
  background:#111;
  padding:10px 15px;
  border-radius:8px;
}
.toast.show{
  opacity:1;
  transform:translateX(-50%) translateY(0);
}
</style>
</head>

<body>

<!-- STATUS -->
<div class="status-bar">
  <span id="clock"></span>
  <span>📶 🔋</span>
</div>

<!-- HOME -->
<div id="home" class="page active p-4">

  <h2 class="text-xl mb-4">👋 Welcome back</h2>

  <!-- BALANCE -->
  <div class="glass p-6 rounded-xl mb-6 text-center">
    <p class="text-gray-400">Balance</p>
    <h1 id="balance" class="text-3xl font-bold mt-2">₦0</h1>
  </div>

  <!-- ACTIONS -->
  <div class="flex justify-between mb-6">
    <button onclick="openAdd()" class="tap bg-green-500 px-4 py-2 rounded">Add</button>
    <button onclick="exportCSV()" class="tap bg-blue-500 px-4 py-2 rounded">Export</button>
  </div>

  <!-- LIST -->
  <ul id="list"></ul>

</div>

<!-- STATS -->
<div id="stats" class="page p-4">
  <canvas id="chart"></canvas>
</div>

<!-- PROFILE -->
<div id="profile" class="page p-4 text-center">

  <h2 class="mb-4">SMORK</h2>

  <div class="flex justify-center gap-5 text-xl mb-4">
    <a href="https://github.com/Smorkfrmdaeast"><i class="fab fa-github"></i></a>
    <a href="https://www.linkedin.com/in/smorkfrmdaeast"><i class="fab fa-linkedin"></i></a>
    <a href="https://www.instagram.com/smork_frmdaeast"><i class="fab fa-instagram"></i></a>
    <a href="https://www.facebook.com/share/1DhHJPTRXL/"><i class="fab fa-facebook"></i></a>
  </div>

  <p class="text-gray-400">ifeanyinuels32@gmail.com</p>
</div>

<!-- NAV -->
<div class="nav">
  <div onclick="switchTab('home')"><i class="fa fa-home"></i></div>
  <div onclick="switchTab('stats')"><i class="fa fa-chart-line"></i></div>
  <div onclick="openAdd()"><i class="fa fa-plus"></i></div>
  <div onclick="switchTab('profile')"><i class="fa fa-user"></i></div>
</div>

<!-- ADD MODAL -->
<div id="modal" class="fixed inset-0 bg-black/70 hidden flex items-end">
  <div class="glass w-full p-4 rounded-t-xl">

    <input id="text" placeholder="Title" class="w-full p-2 mb-2 bg-black rounded"/>
    <input id="amount" type="number" placeholder="Amount" class="w-full p-2 mb-2 bg-black rounded"/>

    <button onclick="addTransaction()" class="w-full bg-green-500 py-2 rounded">Save</button>
    <button onclick="closeAdd()" class="w-full mt-2 text-gray-400">Cancel</button>

  </div>
</div>

<div id="toast" class="toast">Done</div>

<script>
let transactions = JSON.parse(localStorage.getItem("tx")) || [];

function updateClock(){
  const now = new Date();
  document.getElementById("clock").innerText =
    now.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
}
setInterval(updateClock,1000);
updateClock();

/* NAV */
function switchTab(tab){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(tab).classList.add("active");
}

/* MODAL */
function openAdd(){ document.getElementById("modal").classList.remove("hidden"); }
function closeAdd(){ document.getElementById("modal").classList.add("hidden"); }

/* TOAST */
function toast(msg){
  const t = document.getElementById("toast");
  t.innerText = msg;
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2000);
}

/* ADD */
function addTransaction(){
  const text = document.getElementById("text").value;
  const amount = +document.getElementById("amount").value;

  if(!text || !amount) return;

  transactions.push({id:Date.now(),text,amount});
  save();
  render();
  closeAdd();
  toast("Added");
}

/* DELETE */
function del(id){
  transactions = transactions.filter(t=>t.id!==id);
  save();
  render();
  toast("Deleted");
}

/* SAVE */
function save(){
  localStorage.setItem("tx",JSON.stringify(transactions));
}

/* RENDER */
function render(){
  const list = document.getElementById("list");
  list.innerHTML="";

  let total=0;

  transactions.forEach(t=>{
    const li=document.createElement("li");
    li.className="flex justify-between mb-2 glass p-2 rounded";

    li.innerHTML=`
      <span>${t.text}</span>
      <span>₦${t.amount}</span>
      <button onclick="del(${t.id})">x</button>
    `;

    list.appendChild(li);
    total+=t.amount;
  });

  document.getElementById("balance").innerText="₦"+total;

  chart.data.datasets[0].data=[
    transactions.filter(t=>t.amount>0).reduce((a,b)=>a+b.amount,0),
    Math.abs(transactions.filter(t=>t.amount<0).reduce((a,b)=>a+b.amount,0))
  ];
  chart.update();
}

/* CSV */
function exportCSV(){
  let csv="Title,Amount\n";
  transactions.forEach(t=>{
    csv+=`${t.text},${t.amount}\n`;
  });

  const blob=new Blob([csv]);
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="transactions.csv";
  a.click();
}

/* CHART */
const chart = new Chart(document.getElementById("chart"),{
  type:"doughnut",
  data:{
    labels:["Income","Expense"],
    datasets:[{data:[0,0],backgroundColor:["#22c55e","#ef4444"]}]
  }
});

render();
</script>

</body>
</html>
