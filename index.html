<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>SMORK PAY — Expense Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
/* ══════════════════════════════════════
   SMORK PAY — FINTECH DASHBOARD
   PalmPay × OPay × Premium Dark UI
══════════════════════════════════════ */
:root {
  --bg:       #07080f;
  --bg2:      #0d0f1a;
  --bg3:      #111420;
  --card:     rgba(255,255,255,0.045);
  --border:   rgba(255,255,255,0.07);
  --border2:  rgba(255,255,255,0.12);
  --green:    #00c896;
  --green2:   #00ffb3;
  --red:      #ff4d6a;
  --blue:     #3b7cff;
  --blue2:    #6fa3ff;
  --gold:     #f5a623;
  --white:    #f2f4ff;
  --muted:    #6b7a9a;
  --muted2:   #3a4460;
  --r:        20px;
  --r2:       14px;
  --ease:     cubic-bezier(0.23,1,0.32,1);
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}

body{
  font-family:'Plus Jakarta Sans',sans-serif;
  background:var(--bg);
  color:var(--white);
  min-height:100vh;
  overflow-x:hidden;
  -webkit-tap-highlight-color:transparent;
}

/* BG BLOBS */
.bg-blob{position:fixed;border-radius:50%;filter:blur(100px);pointer-events:none;z-index:0;}
.blob1{width:500px;height:500px;background:rgba(0,200,150,0.05);top:-150px;right:-100px;animation:blobMove 20s ease-in-out infinite;}
.blob2{width:400px;height:400px;background:rgba(59,124,255,0.05);bottom:-100px;left:-150px;animation:blobMove 25s ease-in-out infinite reverse;}
.blob3{width:300px;height:300px;background:rgba(245,166,35,0.04);top:40%;left:30%;animation:blobMove 18s ease-in-out infinite 5s;}
@keyframes blobMove{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(30px,-20px) scale(1.05)}66%{transform:translate(-20px,30px) scale(0.95)}}

/* LAYOUT */
.shell{position:relative;z-index:2;max-width:440px;margin:0 auto;padding:0 0 100px;}

/* ── STATUS BAR ── */
.status-bar{
  display:flex;justify-content:space-between;align-items:center;
  padding:16px 24px 8px;
  font-size:12px;color:var(--muted);font-weight:600;letter-spacing:0.5px;
}
.status-time{font-family:'DM Mono',monospace;font-size:13px;color:var(--white);}
.status-icons{display:flex;gap:6px;align-items:center;}

/* ── TOP NAV ── */
.top-nav{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 24px 20px;
  animation:slideDown 0.6s var(--ease) both;
}
@keyframes slideDown{from{opacity:0;transform:translateY(-16px)}to{opacity:1;transform:translateY(0)}}
.nav-left{display:flex;align-items:center;gap:12px;}
.avatar{
  width:42px;height:42px;border-radius:14px;
  background:linear-gradient(135deg,var(--green),var(--blue));
  display:flex;align-items:center;justify-content:center;
  font-weight:800;font-size:16px;color:#000;
  box-shadow:0 4px 16px rgba(0,200,150,0.35);
  flex-shrink:0;
}
.nav-greeting{font-size:11px;color:var(--muted);font-weight:500;letter-spacing:0.5px;}
.nav-name{font-size:16px;font-weight:700;margin-top:1px;}
.notif-btn{
  width:40px;height:40px;border-radius:13px;
  background:var(--card);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;position:relative;transition:all 0.25s var(--ease);
  font-size:17px;
}
.notif-btn:hover{background:rgba(255,255,255,0.08);transform:scale(1.06);}
.notif-dot{
  position:absolute;top:8px;right:8px;
  width:7px;height:7px;border-radius:50%;
  background:var(--red);border:1.5px solid var(--bg);
}

/* ── BALANCE CARD ── */
.balance-card{
  margin:0 16px 16px;
  background:linear-gradient(145deg,#0e2e24 0%,#0a1e3a 50%,#12102a 100%);
  border:1px solid rgba(0,200,150,0.15);
  border-radius:28px;padding:28px 28px 24px;
  position:relative;overflow:hidden;
  animation:fadeUp 0.7s var(--ease) 0.1s both;
  box-shadow:0 20px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(0,200,150,0.08);
}
.balance-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(0,200,150,0.4),rgba(59,124,255,0.4),transparent);
}
.balance-card::after{
  content:'';position:absolute;top:-80px;right:-80px;
  width:220px;height:220px;border-radius:50%;
  background:radial-gradient(circle,rgba(0,200,150,0.08) 0%,transparent 70%);
  pointer-events:none;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}

.balance-label{
  font-size:11px;letter-spacing:2px;text-transform:uppercase;
  color:rgba(255,255,255,0.4);font-weight:600;margin-bottom:10px;
  display:flex;align-items:center;gap:8px;
}
.balance-label::after{content:'';flex:1;height:1px;background:rgba(255,255,255,0.06);}
.balance-amount{
  font-size:clamp(36px,9vw,52px);font-weight:800;
  letter-spacing:-2px;margin-bottom:6px;
  background:linear-gradient(135deg,#fff 40%,var(--green2));
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
  line-height:1;
}
.balance-change{
  font-size:12px;color:var(--green);font-weight:600;
  display:flex;align-items:center;gap:4px;margin-bottom:24px;
}
.balance-change.neg{color:var(--red);}

.balance-stats{
  display:grid;grid-template-columns:1fr 1fr;gap:12px;
}
.bstat{
  background:rgba(255,255,255,0.04);border-radius:var(--r2);
  padding:14px 16px;border:1px solid rgba(255,255,255,0.06);
}
.bstat-label{font-size:10px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px;font-weight:600;}
.bstat-row{display:flex;align-items:center;justify-content:space-between;}
.bstat-val{font-size:18px;font-weight:800;font-family:'DM Mono',monospace;}
.bstat-val.inc{color:var(--green2);}
.bstat-val.exp{color:var(--red);}
.bstat-icon{font-size:20px;}

/* QUICK ACTIONS */
.quick-actions{
  display:grid;grid-template-columns:repeat(4,1fr);gap:12px;
  padding:0 16px;margin-bottom:20px;
  animation:fadeUp 0.7s var(--ease) 0.2s both;
}
.qa-btn{
  display:flex;flex-direction:column;align-items:center;gap:8px;
  cursor:pointer;
}
.qa-icon{
  width:54px;height:54px;border-radius:18px;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;border:1px solid var(--border);
  background:var(--card);
  transition:all 0.3s var(--ease);
  position:relative;overflow:hidden;
}
.qa-icon::before{
  content:'';position:absolute;inset:0;opacity:0;
  background:linear-gradient(135deg,rgba(255,255,255,0.08),transparent);
  transition:opacity 0.3s;
}
.qa-btn:hover .qa-icon{transform:translateY(-4px);box-shadow:0 8px 24px rgba(0,0,0,0.4);}
.qa-btn:hover .qa-icon::before{opacity:1;}
.qa-btn:active .qa-icon{transform:scale(0.93);}
.qa-label{font-size:11px;color:var(--muted);font-weight:600;text-align:center;}
.qa-icon.green{background:rgba(0,200,150,0.12);border-color:rgba(0,200,150,0.2);}
.qa-icon.red{background:rgba(255,77,106,0.12);border-color:rgba(255,77,106,0.2);}
.qa-icon.blue{background:rgba(59,124,255,0.12);border-color:rgba(59,124,255,0.2);}
.qa-icon.gold{background:rgba(245,166,35,0.12);border-color:rgba(245,166,35,0.2);}

/* CHART SECTION */
.section{padding:0 16px;margin-bottom:20px;}
.section-head{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:14px;
}
.section-title{font-size:15px;font-weight:700;}
.section-action{font-size:12px;color:var(--blue2);font-weight:600;cursor:pointer;}

.chart-card{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--r);padding:20px;
  animation:fadeUp 0.7s var(--ease) 0.25s both;
}
.chart-tabs{display:flex;gap:4px;margin-bottom:18px;}
.chart-tab{
  flex:1;padding:8px;border-radius:10px;font-size:11px;font-weight:700;
  letter-spacing:1px;text-transform:uppercase;cursor:pointer;border:none;
  background:none;color:var(--muted);transition:all 0.25s var(--ease);
}
.chart-tab.active{
  background:rgba(0,200,150,0.12);color:var(--green2);
  border:1px solid rgba(0,200,150,0.2);
}
.chart-wrap{position:relative;height:180px;}

/* FILTER PILLS */
.filter-pills{display:flex;gap:8px;margin-bottom:16px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;}
.filter-pills::-webkit-scrollbar{display:none;}
.pill{
  flex-shrink:0;padding:7px 16px;border-radius:30px;font-size:12px;font-weight:700;
  cursor:pointer;border:1px solid var(--border);background:var(--card);
  color:var(--muted);transition:all 0.25s var(--ease);letter-spacing:0.5px;
}
.pill.active{
  background:rgba(0,200,150,0.12);border-color:rgba(0,200,150,0.3);
  color:var(--green2);
}
.pill:hover{background:rgba(255,255,255,0.06);}

/* FORM CARD */
.form-card{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--r);padding:20px;margin-bottom:20px;
  animation:fadeUp 0.7s var(--ease) 0.3s both;
}
.form-title{font-size:14px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px;}
.form-title span{
  width:6px;height:20px;border-radius:3px;
  background:linear-gradient(180deg,var(--green),var(--blue));display:block;
}
.input-group{margin-bottom:12px;}
.input-label{font-size:11px;color:var(--muted);font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;}
.inp{
  width:100%;padding:14px 16px;border-radius:var(--r2);
  background:rgba(255,255,255,0.04);
  border:1px solid var(--border);
  color:var(--white);font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;font-weight:500;
  outline:none;transition:all 0.25s var(--ease);
}
.inp:focus{border-color:var(--green);background:rgba(0,200,150,0.05);box-shadow:0 0 0 3px rgba(0,200,150,0.1);}
.inp::placeholder{color:var(--muted2);}
.type-selector{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;}
.type-btn{
  padding:12px;border-radius:var(--r2);border:1px solid var(--border);
  background:var(--card);cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;
  font-size:13px;font-weight:700;color:var(--muted);
  transition:all 0.25s var(--ease);display:flex;align-items:center;justify-content:center;gap:8px;
}
.type-btn.inc.active{background:rgba(0,200,150,0.12);border-color:rgba(0,200,150,0.3);color:var(--green2);}
.type-btn.exp.active{background:rgba(255,77,106,0.12);border-color:rgba(255,77,106,0.3);color:var(--red);}
.type-btn:hover{transform:scale(1.02);}

.submit-btn{
  width:100%;padding:16px;border-radius:var(--r2);border:none;cursor:pointer;
  font-family:'Plus Jakarta Sans',sans-serif;font-size:15px;font-weight:800;
  letter-spacing:0.5px;color:#000;
  background:linear-gradient(135deg,var(--green),#00a878);
  box-shadow:0 6px 24px rgba(0,200,150,0.35);
  transition:all 0.3s var(--ease);
  position:relative;overflow:hidden;
}
.submit-btn::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,0.15),transparent);
  opacity:0;transition:opacity 0.3s;
}
.submit-btn:hover{transform:translateY(-2px);box-shadow:0 10px 32px rgba(0,200,150,0.5);}
.submit-btn:hover::after{opacity:1;}
.submit-btn:active{transform:scale(0.98);}
.submit-btn.editing{background:linear-gradient(135deg,var(--gold),#e08c00);}

/* TRANSACTIONS */
.tx-list{display:flex;flex-direction:column;gap:8px;}
.tx-card{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--r2);padding:14px 16px;
  display:flex;align-items:center;gap:14px;
  transition:all 0.3s var(--ease);
  animation:txIn 0.4s var(--ease) both;
  cursor:default;
}
@keyframes txIn{from{opacity:0;transform:translateX(-12px)}to{opacity:1;transform:translateX(0)}}
.tx-card:hover{background:rgba(255,255,255,0.05);transform:translateX(4px);}
.tx-icon-wrap{
  width:44px;height:44px;border-radius:14px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:20px;
  background:rgba(255,255,255,0.05);border:1px solid var(--border);
}
.tx-icon-wrap.inc{background:rgba(0,200,150,0.1);border-color:rgba(0,200,150,0.2);}
.tx-icon-wrap.exp{background:rgba(255,77,106,0.1);border-color:rgba(255,77,106,0.2);}
.tx-info{flex:1;min-width:0;}
.tx-title{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tx-date{font-size:11px;color:var(--muted);margin-top:2px;font-family:'DM Mono',monospace;}
.tx-right{text-align:right;flex-shrink:0;}
.tx-amount{font-size:15px;font-weight:800;font-family:'DM Mono',monospace;}
.tx-amount.inc{color:var(--green2);}
.tx-amount.exp{color:var(--red);}
.tx-actions{display:flex;gap:6px;margin-top:4px;justify-content:flex-end;}
.tx-act{
  padding:3px 8px;border-radius:6px;font-size:10px;font-weight:700;
  cursor:pointer;border:none;font-family:'Plus Jakarta Sans',sans-serif;
  transition:all 0.2s;
}
.tx-act.edit{background:rgba(59,124,255,0.15);color:var(--blue2);}
.tx-act.del{background:rgba(255,77,106,0.12);color:var(--red);}
.tx-act:hover{transform:scale(1.08);}

/* EMPTY STATE */
.empty-tx{
  text-align:center;padding:48px 20px;
  animation:fadeUp 0.6s var(--ease) both;
}
.empty-tx-icon{font-size:48px;margin-bottom:12px;opacity:0.4;}
.empty-tx-title{font-size:15px;font-weight:700;color:var(--muted);margin-bottom:6px;}
.empty-tx-sub{font-size:13px;color:var(--muted2);}

/* BOTTOM NAV */
.bottom-nav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:440px;
  background:rgba(10,12,22,0.95);backdrop-filter:blur(24px);
  border-top:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-around;
  padding:12px 16px 24px;z-index:100;
}
.nav-item{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  cursor:pointer;padding:4px 14px;border-radius:12px;
  border:none;background:none;transition:all 0.25s var(--ease);
}
.nav-item span{font-size:20px;}
.nav-item p{font-size:10px;letter-spacing:0.5px;color:var(--muted);font-weight:600;text-transform:uppercase;}
.nav-item.active p{color:var(--green2);}
.nav-item.active span{filter:drop-shadow(0 0 6px var(--green));}
.nav-center{
  width:52px;height:52px;border-radius:18px;
  background:linear-gradient(135deg,var(--green),var(--blue));
  display:flex;align-items:center;justify-content:center;
  border:none;cursor:pointer;margin-top:-16px;
  box-shadow:0 0 24px rgba(0,200,150,0.5),0 4px 16px rgba(0,0,0,0.4);
  font-size:22px;transition:all 0.25s var(--ease);
}
.nav-center:hover{transform:scale(1.1) translateY(-2px);box-shadow:0 0 40px rgba(0,200,150,0.7);}

/* TOAST */
.toast-container{position:fixed;top:24px;left:50%;transform:translateX(-50%);z-index:999;display:flex;flex-direction:column;align-items:center;gap:8px;}
.toast{
  background:rgba(10,14,24,0.96);border-radius:30px;padding:11px 22px;
  font-size:13px;font-weight:700;letter-spacing:0.5px;
  backdrop-filter:blur(16px);white-space:nowrap;
  animation:toastIn 0.4s var(--ease) both, toastOut 0.4s var(--ease) 2.4s both;
  display:flex;align-items:center;gap:8px;
}
.toast.success{border:1px solid rgba(0,200,150,0.3);color:var(--green2);box-shadow:0 0 20px rgba(0,200,150,0.2);}
.toast.error{border:1px solid rgba(255,77,106,0.3);color:var(--red);}
.toast.info{border:1px solid rgba(59,124,255,0.3);color:var(--blue2);}
@keyframes toastIn{from{opacity:0;transform:translateY(-12px) scale(0.9)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes toastOut{from{opacity:1}to{opacity:0;transform:translateY(-12px)}}

/* SCROLL */
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:4px;}

/* ANIMATIONS */
@keyframes countUp{from{transform:scale(1.08) translateY(-4px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}
.count-anim{animation:countUp 0.4s var(--ease) both;}

@media(max-width:360px){
  .quick-actions{grid-template-columns:repeat(4,1fr);}
  .qa-icon{width:46px;height:46px;font-size:18px;}
}
</style>
</head>
<body>

<!-- BG BLOBS -->
<div class="bg-blob blob1"></div>
<div class="bg-blob blob2"></div>
<div class="bg-blob blob3"></div>

<!-- TOAST -->
<div class="toast-container" id="toastContainer"></div>

<div class="shell">

  <!-- STATUS BAR -->
  <div class="status-bar">
    <div class="status-time" id="statusTime">12:00</div>
    <div class="status-icons">📶 🔋</div>
  </div>

  <!-- TOP NAV -->
  <div class="top-nav">
    <div class="nav-left">
      <div class="avatar">S</div>
      <div>
        <div class="nav-greeting">GOOD MORNING</div>
        <div class="nav-name">SMORK 👋</div>
      </div>
    </div>
    <button class="notif-btn" onclick="toast('🔔 No new notifications','info')">
      🔔<div class="notif-dot"></div>
    </button>
  </div>

  <!-- BALANCE CARD -->
  <div class="balance-card" style="animation-delay:0.1s">
    <div class="balance-label">Total Balance</div>
    <div class="balance-amount" id="balanceAmt">₦0.00</div>
    <div class="balance-change" id="balanceChange">
      <span>↑</span><span id="balanceChangeText">+₦0.00 this month</span>
    </div>
    <div class="balance-stats">
      <div class="bstat">
        <div class="bstat-label">Income</div>
        <div class="bstat-row">
          <div class="bstat-val inc" id="incomeAmt">₦0</div>
          <div class="bstat-icon">📈</div>
        </div>
      </div>
      <div class="bstat">
        <div class="bstat-label">Expenses</div>
        <div class="bstat-row">
          <div class="bstat-val exp" id="expenseAmt">₦0</div>
          <div class="bstat-icon">📉</div>
        </div>
      </div>
    </div>
  </div>

  <!-- QUICK ACTIONS -->
  <div class="quick-actions">
    <div class="qa-btn" onclick="focusForm('income')">
      <div class="qa-icon green">💰</div>
      <div class="qa-label">Income</div>
    </div>
    <div class="qa-btn" onclick="focusForm('expense')">
      <div class="qa-icon red">💸</div>
      <div class="qa-label">Expense</div>
    </div>
    <div class="qa-btn" onclick="exportCSV()">
      <div class="qa-icon blue">📊</div>
      <div class="qa-label">Export</div>
    </div>
    <div class="qa-btn" onclick="clearAll()">
      <div class="qa-icon gold">🗑️</div>
      <div class="qa-label">Clear</div>
    </div>
  </div>

  <!-- CHART -->
  <div class="section" style="animation:fadeUp 0.7s var(--ease) 0.3s both">
    <div class="section-head">
      <div class="section-title">Overview</div>
      <div class="section-action" onclick="toast('Full analytics in v2 🚀','info')">View all →</div>
    </div>
    <div class="chart-card">
      <div class="chart-tabs">
        <button class="chart-tab active" onclick="switchChart('doughnut',this)">Split</button>
        <button class="chart-tab" onclick="switchChart('bar',this)">Monthly</button>
        <button class="chart-tab" onclick="switchChart('line',this)">Trend</button>
      </div>
      <div class="chart-wrap">
        <canvas id="mainChart"></canvas>
      </div>
    </div>
  </div>

  <!-- ADD TRANSACTION -->
  <div class="section">
    <div class="form-card" id="formCard">
      <div class="form-title"><span></span><span id="formTitleText">Add Transaction</span></div>
      <div class="type-selector">
        <button class="type-btn inc active" id="btnInc" onclick="setType('income')">📈 Income</button>
